{% set name = "azure-mgmt-cognitiveservices" %}
{% set version = "14.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 915191374d0adb443863c20aaea2c9f3b9d558a849ac2b78f152249262fdcaf8

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - wheel
    - setuptools >=77.0.3
    - python 
    - pip
  run:
    - python
    - msrest >=0.7.1
    - azure-mgmt-core >=1.6.0
    - typing_extensions >=4.6.0
    
test:
  imports:
    - azure.mgmt.cognitiveservices
    - azure.mgmt.cognitiveservices.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Cognitive Services Management Client Library for Python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: Microsoft Azure Cognitive Services Management Client Library for Python
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
